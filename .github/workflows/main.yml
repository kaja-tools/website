name: main
on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push website-home
        uses: docker/build-push-action@v3
        with:
          context: ./apps/home
          push: ${{ github.event_name == 'push' }}
          tags: |
            kajatools/website-home:latest
      - name: Build and push website-teams
        uses: docker/build-push-action@v3
        with:
          context: ./apps/teams
          push: ${{ github.event_name == 'push' }}
          tags: |
            kajatools/website-teams:latest
      - name: Build and push website-users
        uses: docker/build-push-action@v3
        with:
          context: ./apps/users
          push: ${{ github.event_name == 'push' }}
          tags: |
            kajatools/website-users:latest
      - name: Build and push website-quirks
        uses: docker/build-push-action@v3
        with:
          context: ./apps/quirks
          push: ${{ github.event_name == 'push' }}
          tags: |
            kajatools/website-quirks:latest
      - name: Build and push website-theatre
        uses: docker/build-push-action@v3
        with:
          context: ./apps/theatre
          push: ${{ github.event_name == 'push' }}
          tags: |
            kajatools/website-theatre:latest
      - name: Build and push website-seating
        uses: docker/build-push-action@v3
        with:
          context: ./apps/seating
          push: ${{ github.event_name == 'push' }}
          tags: |
            kajatools/website-seating:latest
      - name: Build and push website-boxoffice
        uses: docker/build-push-action@v3
        with:
          context: ./apps/boxoffice
          push: ${{ github.event_name == 'push' }}
          tags: |
            kajatools/website-boxoffice:latest
