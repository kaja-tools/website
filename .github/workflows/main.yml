name: main
on:
  push:
    branches:
      - "main"
jobs:
  deploy:
    name: Deploy ${{ matrix.name }}
    runs-on: ubuntu-latest
    # Fly deploys of the same app must not overlap.
    concurrency: deploy-${{ matrix.name }}
    strategy:
      # Deploy every app, even if one fails, so a single flaky deploy doesn't
      # block the rest.
      fail-fast: false
      matrix:
        include:
          - { name: home, dir: apps/home }
          - { name: theatre, dir: apps/theatre }
          - { name: seating, dir: apps/seating }
          - { name: boxoffice, dir: apps/boxoffice }
          - { name: quirks-grpc, dir: apps/quirks, config: apps/quirks/fly.grpc.toml }
          - { name: quirks-twirp, dir: apps/quirks, config: apps/quirks/fly.twirp.toml }
          # kaja bakes proto files from sibling apps, so it builds from the repo root.
          - { name: kaja, dir: ".", config: apps/kaja/fly.toml }
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy ${{ matrix.dir }} ${{ matrix.config && format('--config {0}', matrix.config) || '' }} --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
