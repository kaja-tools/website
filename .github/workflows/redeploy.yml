name: redeploy
# Manually-triggered workflow that redeploys services to the production
# cluster by restarting their deployments. Because the images are published
# with the ":latest" tag by the "main" workflow, a rollout restart pulls the
# freshly built image for each service.
#
# Requires a repository secret named KUBE_CONFIG containing a base64-encoded
# kubeconfig with access to the "kaja" cluster.
on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to redeploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - home
          - kaja
          - teams
          - users
          - grpc-quirks
          - twirp-quirks
          - boxoffice
          - seating
          - theatre
jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      # The /demo app reads its project list from kaja.json and its protos from
      # the persistent workspace PVC. A rollout restart alone does not touch the
      # PVC, so seed it here whenever kaja (or all) is redeployed — otherwise the
      # demo keeps serving whatever config was last copied in.
      - name: Seed kaja workspace
        if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'kaja' }}
        run: |
          set -e
          POD_NAME=$(kubectl get pods -l app=kaja --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}')
          if [[ -z "$POD_NAME" ]]; then
            echo "::error::No running kaja pod found to seed the workspace"
            exit 1
          fi
          echo "Seeding configuration and proto files into $POD_NAME"
          kubectl exec "$POD_NAME" -- rm -rf /workspace/teams /workspace/users /workspace/seating /workspace/boxoffice
          kubectl exec "$POD_NAME" -- mkdir /workspace/seating /workspace/boxoffice
          kubectl cp apps/kaja/kaja.json "$POD_NAME":/workspace/kaja.json
          kubectl cp apps/seating/proto/seating.proto "$POD_NAME":/workspace/seating/seating.proto
          kubectl cp apps/boxoffice/proto/boxoffice.proto "$POD_NAME":/workspace/boxoffice/boxoffice.proto

      - name: Redeploy service(s)
        run: |
          set -e
          all_deployments=(
            home-deployment
            kaja-deployment
            teams-deployment
            users-deployment
            grpc-quirks-deployment
            twirp-quirks-deployment
            boxoffice-deployment
            seating-deployment
            theatre-deployment
          )

          if [[ "${{ github.event.inputs.service }}" == "all" ]]; then
            requested=("${all_deployments[@]}")
          else
            requested=("${{ github.event.inputs.service }}-deployment")
          fi

          # Only act on deployments that actually exist on the cluster. Some
          # services (e.g. boxoffice/seating/theatre) may not be deployed yet,
          # and restarting a missing deployment would fail the whole run.
          targets=()
          for deployment in "${requested[@]}"; do
            if kubectl get "deployment/$deployment" >/dev/null 2>&1; then
              targets+=("$deployment")
            else
              echo "::warning::Skipping $deployment — not found on the cluster"
            fi
          done

          if [[ ${#targets[@]} -eq 0 ]]; then
            echo "::error::No matching deployments found on the cluster"
            exit 1
          fi

          for deployment in "${targets[@]}"; do
            echo "Restarting $deployment"
            kubectl rollout restart "deployment/$deployment"
          done

          for deployment in "${targets[@]}"; do
            echo "Waiting for $deployment to finish rolling out"
            kubectl rollout status "deployment/$deployment" --timeout=180s
          done
