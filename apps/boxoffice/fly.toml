# Box office Twirp service. Public at boxoffice.kaja.tools (Twirp under /twirp).
# Talks to theatre (HTTP) and seating (gRPC) over Fly's private network.
#   fly certs add boxoffice.kaja.tools --app kaja-boxoffice
app = "kaja-boxoffice"
primary_region = "iad"

[build]

[env]
  THEATRE_URL = "http://kaja-theatre.internal:41530"
  PUBLIC_THEATRE_URL = "https://theatre.kaja.tools"
  SEATING_ADDR = "kaja-seating.internal:50053"

[http_service]
  internal_port = 41531
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep one machine up so the background "crowd" simulation keeps running.
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
