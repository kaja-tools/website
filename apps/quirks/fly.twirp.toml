# Quirks Twirp server. Public at twirp-quirks.kaja.tools (Twirp under /twirp).
# Deploy with: fly deploy apps/quirks --config apps/quirks/fly.twirp.toml
#   fly certs add twirp-quirks.kaja.tools --app kaja-quirks-twirp
app = "kaja-quirks-twirp"
primary_region = "iad"

[build]

[processes]
  app = "/app/twirp-server"

[http_service]
  internal_port = 41523
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
