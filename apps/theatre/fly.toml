# Theatre OpenAPI service. Public at theatre.kaja.tools.
#   fly certs add theatre.kaja.tools --app kaja-theatre
app = "kaja-theatre"
primary_region = "sjc"

[build]

[env]
  PUBLIC_BASE_URL = "https://theatre.kaja.tools"

[http_service]
  internal_port = 41530
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
