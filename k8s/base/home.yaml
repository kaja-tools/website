apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-deployment
  labels:
    app: home
spec:
  replicas: 1
  strategy:
    # Single node at its pod cap: a surge pod can't be scheduled, so replace
    # the old pod before starting the new one on redeploy.
    type: Recreate
  selector:
    matchLabels:
      app: home
  template:
    metadata:
      labels:
        app: home
    spec:
      containers:
      - name: home
        image: kajatools/website-home:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: home-service
spec:
  selector:
    app: home
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP