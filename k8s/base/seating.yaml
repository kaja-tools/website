apiVersion: apps/v1
kind: Deployment
metadata:
  name: seating-deployment
  labels:
    app: seating
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seating
  template:
    metadata:
      labels:
        app: seating
    spec:
      containers:
      - name: seating
        image: kajatools/website-seating:latest
        imagePullPolicy: Always
        env:
        - name: THEATRE_URL
          value: "http://theatre-service/theatre"
        ports:
        - containerPort: 50053
---
apiVersion: v1
kind: Service
metadata:
  name: seating-service
spec:
  selector:
    app: seating
  ports:
    - port: 80
      targetPort: 50053
  type: ClusterIP
